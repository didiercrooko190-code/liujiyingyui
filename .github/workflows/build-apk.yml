name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download full offline site from Vercel
        shell: bash
        run: |
          set -e
          BASE="https://cet6-full.vercel.app"
          ROOT="app/src/main/assets/site"
          mkdir -p "$ROOT"
          download() {
            local path="$1"
            local out="$ROOT/$path"
            mkdir -p "$(dirname "$out")"
            echo "Downloading $path"
            curl -fL --retry 5 --retry-delay 2 --connect-timeout 20 --max-time 300 --output "$out" "$BASE/$path"
          }
          download "app.js"
          download "index.html"
          download "INTEGRATED_SUMMARY.json"
          download "manifest.webmanifest"
          download "styles.css"
          download "sw.js"
          download "assets/listening-transcripts.js"
          download "assets/paper-manifest.js"
          download "assets/icons/icon-192.png"
          download "assets/icons/icon-512.png"
          download "assets/imported/2019/cet6_2019_06_1.mp3"
          download "assets/imported/2019/cet6_2019_06_1.pdf"
          download "assets/imported/2019/cet6_2019_06_1_ans.pdf"
          download "assets/imported/2019/cet6_2019_06_2.mp3"
          download "assets/imported/2019/cet6_2019_06_2.pdf"
          download "assets/imported/2019/cet6_2019_06_2_ans.pdf"
          download "assets/imported/2019/cet6_2019_06_3.pdf"
